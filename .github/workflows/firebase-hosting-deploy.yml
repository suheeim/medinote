name: Deploy to Firebase Hosting on push

# main へ push されるたびに Firebase Hosting (watashi-no-kusuri) の本番へ自動デプロイ
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WATASHI_NO_KUSURI }}
          channelId: live
          projectId: watashi-no-kusuri
