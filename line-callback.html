<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LINE連携</title>
<style>
  body{font-family:-apple-system,"Hiragino Sans",sans-serif;text-align:center;padding:48px 20px;color:#2f7d6e;background:#f3f7f5}
  .ok{font-size:2.4rem}
</style>
</head>
<body>
  <div class="ok">💊</div>
  <p id="msg">LINE連携を処理しています…</p>
  <script>
  (function(){
    var p = new URLSearchParams(location.search);
    var line = p.get('line'), name = p.get('lineName') || '';
    if(line){
      // 通常ブラウザのポップアップなら親へ通知（即時反映）。
      // PWA（iOS）ではこのページはSafariで開くため opener は無く postMessage は届かないが、
      // PWA側はサーバーのリンクコードをポーリングして連携を検知するので問題ない。
      try{ if(window.opener) window.opener.postMessage({ type:'line-linked', line:line, lineName:name }, location.origin); }catch(e){}
      // どの経路でも、この画面は自動で閉じてPWA/元の画面へ戻す（index.html へ遷移させない＝Safariに残さない）。
      document.getElementById('msg').textContent = '連携が完了しました。この画面は自動で閉じます。';
      setTimeout(function(){ try{ window.close(); }catch(e){} }, 300);
      // window.close() が効かない環境（PWAから開いたSafariタブ等）向けの案内。
      setTimeout(function(){ document.getElementById('msg').textContent = '連携が完了しました。この画面を閉じてアプリに戻ってください。'; }, 1200);
    } else {
      document.getElementById('msg').textContent = '連携情報を取得できませんでした。もう一度お試しください。';
    }
  })();
  </script>
</body>
</html>
